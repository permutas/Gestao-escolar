<!DOCTYPE html>
<html lang="pt">
<head>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1976d2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGE - EP Phandira-2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif;}
body{background:#f1f5f9;height:100vh;}
.navbar{background:#06b6d4;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;color:white;flex-wrap:wrap;}
.logo{font-size:20px;font-weight:bold;}
.menu a{color:white;margin-left:20px;padding:8px 16px;border-radius:8px;cursor:pointer;}
.container{display:flex;justify-content:center;align-items:center;height:calc(100vh - 70px);}
.card{background:linear-gradient(135deg,#22d3ee,#22c55e);padding:40px;border-radius:18px;text-align:center;width:90%;max-width:460px;color:white;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;}
.modal-content{background:white;padding:30px;border-radius:14px;width:340px;}
.input-group{margin-bottom:15px;}
.input-group input{width:100%;padding:10px;border-radius:8px;border:1px solid #cbd5e1;}
.btn{width:100%;padding:10px;border:none;border-radius:8px;background:#06b6d4;color:white;font-weight:bold;cursor:pointer;}
.close{background:#e2e8f0;color:#0f172a;margin-top:8px;}
.error{color:red;font-size:14px;margin-bottom:10px;display:none;text-align:center;transition: opacity 0.5s;}
@media (max-width:768px){

    .navbar{
        padding:15px;
    }

    .logo{
        font-size:22px;
    }

    .menu a{
        margin-left:10px;
        font-size:18px;
    }

    .container{
        padding:20px;
    }

    .card{
        width:100%;
        padding:35px 25px;
    }

    .card h1{
        font-size:30px;
    }

    .card p{
        font-size:18px;
        margin-top:15px;
    }

    .modal-content{
        width:92%;
        max-width:360px;
    }

    .input-group input{
        font-size:16px;
        padding:14px;
    }

    .btn{
        font-size:16px;
        padding:14px;
    }
}

</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Phandira-2</div>
    <div class="menu">
        <a onclick="openModal()">Login</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>Bem-vindo ao sistema de gestão</h1>
        <p>Escola Primária Phandira-2</p>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <div id="errorMsg" class="error"></div>

        <form id="loginForm">
            <div class="input-group">
                <input name="usuario" placeholder="Usuário" required>
            </div>
            <div class="input-group">
                <input type="password" name="senha" placeholder="Senha" required>
            </div>
            <button class="btn" type="submit">Entrar</button>
        </form>

        <button class="btn close" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
function openModal(){ document.getElementById("loginModal").style.display="flex"; }
function closeModal(){ document.getElementById("loginModal").style.display="none"; }
window.onclick = function(e){ const modal=document.getElementById("loginModal"); if(e.target===modal){ modal.style.display="none"; } }

// LOGIN COM TRATAMENTO CORRETO
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(this);

    try {
        const response = await fetch("/dashboard", {
            method: "POST",
            body: new URLSearchParams(formData)
        });

        const errorDiv = document.getElementById("errorMsg");

        if(response.ok){
            // LOGIN CORRETO → HTML retornado
            const html = await response.text();
            document.open();
            document.write(html);
            document.close();
        } else {
            // LOGIN INVÁLIDO → JSON retornado
            let data;
            try { data = await response.json(); } catch(err){ data = {detail:"Erro desconhecido"}; }

            // Substituir "Usuário não encontrado" por "Usuário ou senha inválidos"
            let mensagem = data.detail || "Usuário ou senha inválidos";
            if(mensagem.toLowerCase().includes("usuário não encontrado")){
                mensagem = "Dados de Acesso Inválidos! Confirme e tente novamente.";
            }

            errorDiv.style.display="block";
            errorDiv.style.opacity = "1";
            errorDiv.textContent = mensagem;

            // Mensagem desaparece automaticamente depois de 3 segundos
            setTimeout(() => {
                errorDiv.style.opacity = "0";
                setTimeout(() => { errorDiv.style.display="none"; }, 500);
            }, 10000);
        }

    } catch(err){
        console.error("Erro de conexão:", err);
        const errorDiv = document.getElementById("errorMsg");
        errorDiv.style.display="block";
        errorDiv.style.opacity = "1";
        errorDiv.textContent = "Erro no servidor";
        setTimeout(() => {
            errorDiv.style.opacity = "0";
            setTimeout(() => { errorDiv.style.display="none"; }, 500);
        }, 3000);
    }
});
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/static/service-worker.js")
        .then(reg => console.log("Service Worker registrado"))
        .catch(err => console.log(err));
    });
}
</script>

</body>
</html>
