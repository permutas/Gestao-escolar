<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gestão de Contactos</title>

<style>
body { font-family: Arial, sans-serif; background:#f1f5f9; margin:0; padding:0; }

/* BOTÃO BACK */
.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:22px;
    cursor:pointer;
    background:#06b6d4;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    transition:0.3s;
    z-index:1000;
}
.back-btn:hover{
    background:#0891b2;
}

.container {
    max-width:1200px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    overflow-x:auto;
}

h1 { text-align:center; margin-bottom:20px; color:#0f172a; }

form { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:30px; }

form input {
    padding:10px;
    border-radius:6px;
    border:1px solid #cbd5e1;
    flex:1;
    min-width:150px;
}

.checkbox-group { display:flex; gap:15px; flex-wrap:wrap; }

.checkbox-group label {
    display:flex;
    align-items:center;
    gap:5px;
}

form button {
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#06b6d4;
    color:white;
    cursor:pointer;
    transition:.3s;
}

form button:hover { background:#0891b2; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    min-width:700px;
}

table th, table td {
    border:1px solid #cbd5e1;
    padding:10px;
    text-align:left;
    font-size:14px;
}

table th {
    background:#06b6d4;
    color:white;
}

.actions button {
    margin-right:5px;
    padding:5px 10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.actions .edit { background:#22c55e; color:white; }
.actions .delete { background:#ef4444; color:white; }

/* mensagens */
#mensagem {
    display: none;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 5px;
}
</style>
</head>

<body>

<!-- BOTÃO VOLTAR -->
<div class="back-btn" onclick="voltarPagina()">←</div>

<div class="container">
    <h1>Adicionar/Atualizar/Apagar Contactos</h1>

    <div id="mensagem"></div>

    <form id="formContacto">
        <input type="hidden" id="contactoId">

        <div class="checkbox-group">
            <p>Escolha apenas as opções onde deseja adicionar o contacto</p>
            <label><input type="checkbox" name="tipo" value="diretor"> Diretor/Adjunto</label>
            <label><input type="checkbox" name="tipo" value="direcao"> Direção/Chefe de Secretaria</label>
            <label><input type="checkbox" name="tipo" value="professores"> Professores</label>
            <label><input type="checkbox" name="tipo" value="funcionarios"> Funcionários</label>
        </div>

        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="telefone" placeholder="Telefone (9 dígitos)" maxlength="9" required>

        <button type="submit">Salvar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tipo</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="contactosBody"></tbody>
    </table>
</div>

<script>
const API_BASE = "";

/* BOTÃO VOLTAR INTELIGENTE */
function voltarPagina(){
    if(document.referrer !== ""){
        window.history.back();
    }else{
        window.location.href = "/dap"; // fallback
    }
}

// ==========================
// MENSAGEM
// ==========================
function exibirMensagem(mensagem, tipo="erro"){
    const div=document.getElementById("mensagem");
    div.style.display="block";
    div.textContent=mensagem;

    if(tipo==="erro"){
        div.style.background="#f8d7da";
        div.style.color="#721c24";
    }else{
        div.style.background="#d4edda";
        div.style.color="#155724";
    }
}

// ==========================
function removerAcentos(texto){
    return texto.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9 ]/g,"");
}

function resetForm(){
    formContacto.reset();
    contactoId.value="";
}

function getTiposSelecionados(){
    return Array.from(document.querySelectorAll('input[name="tipo"]:checked')).map(cb=>cb.value);
}

// ==========================
async function listarContactos(){
    const tbody=document.getElementById("contactosBody");
    tbody.innerHTML="";
    const tipos=["diretor","direcao","professores","funcionarios"];

    for(const tipo of tipos){
        const res=await fetch(`${API_BASE}/contactos/${tipo}`);
        const dados=await res.json();

        dados.forEach(c=>{
            const tr=document.createElement("tr");
            tr.innerHTML=`
                <td>${c.id}</td>
                <td>${tipo}</td>
                <td>${c.nome}</td>
                <td>${c.telefone}</td>
                <td class="actions">
                    <button class="edit" onclick="editar('${tipo}',${c.id})">Editar</button>
                    <button class="delete" onclick="deletar('${tipo}',${c.id})">Apagar</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }
}

// ==========================
async function criarOuAtualizarContacto(e){
    e.preventDefault();

    const id=contactoId.value;
    const tipos=getTiposSelecionados();
    let nome=removerAcentos(document.getElementById("nome").value.trim());
    let telefone=document.getElementById("telefone").value.trim();

    if(!nome||!telefone||tipos.length===0){
        exibirMensagem("Preencha todos os campos corretamente");
        return;
    }

    if(!/^\d{9}$/.test(telefone)){
        exibirMensagem("Telefone deve ter 9 dígitos");
        return;
    }

    telefone="258"+telefone;
    const dados={nome,telefone};

    for(const tipo of tipos){
        if(id){
            await fetch(`${API_BASE}/contactos/${tipo}/${id}`,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(dados)
            });
        }else{
            await fetch(`${API_BASE}/contactos/${tipo}`,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(dados)
            });
        }
    }

    exibirMensagem("Contacto salvo!", "sucesso");
    resetForm();
    listarContactos();
}

// ==========================
async function editar(tipo,id){
    const res=await fetch(`${API_BASE}/contactos/${tipo}`);
    const dados=await res.json();
    const c=dados.find(i=>i.id===id);
    if(!c) return;

    contactoId.value=c.id;
    nome.value=c.nome;
    telefone.value=c.telefone.slice(3);

    document.querySelectorAll('input[name="tipo"]').forEach(cb=>{
        cb.checked=cb.value===tipo;
    });
}

// ==========================
async function deletar(tipo,id){
    await fetch(`${API_BASE}/contactos/${tipo}/${id}`,{method:"DELETE"});
    exibirMensagem("Apagado!", "sucesso");
    listarContactos();
}

// ==========================
formContacto.addEventListener("submit",criarOuAtualizarContacto);

nome.addEventListener("input",(e)=>{
    const pos=e.target.selectionStart;
    e.target.value=removerAcentos(e.target.value);
    e.target.setSelectionRange(pos,pos);
});

listarContactos();
</script>

</body>
</html>
